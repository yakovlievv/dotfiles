source-file ~/.config/tmux/binds.conf

set -g mouse on
set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ',xterm-kitty:Tc:sitm=\E[=1s'
set -ga terminal-overrides ',wezterm:Tc'
# undercurl + colored underline passthrough (squiggly diagnostics, gray context separator)
set -as terminal-features '*:usstyle'
set -s extended-keys always
# neovim parses the kitty CSI-u key form, not the default xterm "CSI 27~" form
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'wezterm:extkeys'
set -as terminal-features 'ghostty:extkeys'
set -g allow-passthrough on
set -ga update-environment "TERM_PROGRAM"
set -g prefix C-space
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 10
set -g focus-events on
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g mode-keys vi

# Status bar
set -g status-style bg=default
set -g status-left "\
#[fg=#{?client_prefix,#{@thm_red},#{@thm_mauve}}] #S\
#[bg=default,fg=#{@thm_surface_1}]  #(short-path \"#{pane_current_path}\")\
#[bg=default,fg=default]"
set -g status-right "#{?#{!=:#(org-clock-heading),},#[fg=#{@thm_surface_1}]#(org-clock-heading) #[fg=#{@thm_blue}]#(org-clock-time),#[fg=#{@thm_surface_1}]no active clock}"

set -g window-status-style "fg=#{@thm_surface_1}"
set -g window-status-current-style "fg=#{@thm_lavender} bold"

set -g status-left-length 100
set -g status-right-length 100
set -g status-justify absolute-centre

set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background none

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Use Alt+h/j/k/l instead of the default Ctrl (avoids clashing with the
# claudecode terminal's line-editing keys). Pairs with nvim's <M-hjkl> maps.
set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_down "M-j"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_prev ""

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
if-shell "uname | grep -q Darwin" \
  "run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'" \
  "run /usr/share/tmux-plugin-manager/tpm"

