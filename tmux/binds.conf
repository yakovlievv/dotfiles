bind F command-prompt { find-window -Z "%%" }
bind f display-popup -E -w "90%" -h "90%" -b none -s "bg=terminal" -S "bg=terminal,fg=#{@thm_overlay_0}" "tmux-sessionizer"
bind y display-popup -E -w "90%" -h "90%" -d "#{pane_current_path}" -b none -s "bg=terminal" -S "bg=terminal,fg=#{@thm_overlay_0}" "yazi"
bind C-space last-window

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+h/j/k/l pane switching (incl. seamless crossing into Neovim splits) is
# handled by the vim-tmux-navigator plugin, configured in tmux.conf.

bind C-l switch-client -n
bind C-h switch-client -p

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind C-f display-popup -E -w "60%" -h "60%" -b rounded -s "bg=terminal" -S "bg=terminal,fg=#{@thm_overlay_0}" "\
  tmux list-sessions -F '#{session_last_attached} #{session_name}: #{session_windows} windows' | \
  sort -rn | \
  cut -d' ' -f2- | \
  grep -v \"^$(tmux display-message -p '#S'):\" | \
  fzf --header='Switch to session (MRU)' | \
  cut -d: -f1 | \
  xargs -I{} tmux switch-client -t {}"

bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Alt+arrows: resize the Neovim edge/split when focused in nvim, else the tmux
# pane. is_vim inspects the focused pane's foreground process (covers nvim, incl.
# its terminal buffers like claudecode, since they run inside the nvim process).
# Mirrors the vim-tmux-navigator M-hjkl recipe; -r repeat is dropped (it's
# incompatible with if-shell), but spamming the key still works.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n M-Left  if-shell "$is_vim" 'send-keys M-Left'  'resize-pane -L 5'
bind -n M-Down  if-shell "$is_vim" 'send-keys M-Down'  'resize-pane -D 5'
bind -n M-Up    if-shell "$is_vim" 'send-keys M-Up'    'resize-pane -U 5'
bind -n M-Right if-shell "$is_vim" 'send-keys M-Right' 'resize-pane -R 5'

bind x kill-pane
bind C-x kill-window

bind r command-prompt "rename-window '%%'"
bind R command-prompt "rename-session '%%'"

bind c new-window -c "#{pane_current_path}"

bind ^R source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded"

bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection-and-cancel

bind W display-popup -E -w "60%" -h "60%" -b none -s "bg=terminal" -S "bg=terminal,fg=#{@thm_overlay_0}" "\
  tmux list-windows -F '#{window_index}: #{window_name} (#{pane_current_command})' | \
  fzf --multi --header='Tab=select, Enter=kill' | \
  cut -d: -f1 | \
  xargs -I{} tmux kill-window -t {}"
