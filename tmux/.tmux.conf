source-file ~/.config/tmux/binds.conf

set -g mouse on
set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ',xterm-kitty:Tc:sitm=\E[=1s'
set -g allow-passthrough on
set -g prefix C-space
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g focus-events on
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g mode-keys vi

# Status bar
set -g status-style bg=default
set -g status-left "\
#[fg=#{?client_prefix,#{@thm_red},#{@thm_mauve}}] #S\
#[bg=default,fg=#{@thm_red}]    #(basename \"#{pane_current_path}\")\
#[bg=default,fg=default]"
set -g status-right "#[fg=#{@thm_sapphire}]󰆍 #(uptime | sed 's/^[^,]*up *//; s/, *[[:digit:]]* user.*//; s/ day.*, */d /; s/ hr\\(s*\\).*/h/; s/ min\\(s*\\).*/m/; s/ sec\\(s*\\).*/s/; s/\\([0-9]\\{1,2\\}\\):\\([0-9]\\{1,2\\}\\)/\\1h \\2m/')\
#[fg=#{@thm_green}]    #h"

set -g window-status-style "fg=#{@thm_surface_1}"
set -g window-status-current-style "fg=#{@thm_lavender} bold"

set -g status-left-length 100
set -g status-right-length 100
set -g status-justify absolute-centre

set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background none

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
if-shell "uname | grep -q Darwin" \
  "run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'" \
  "run '$HOME/.config/tmux/plugins/tpm/tpm'"
