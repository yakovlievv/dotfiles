include current-theme.conf

map ctrl+backspace send_text all \x17
map ctrl+i send_text all \x1b[105;5u

# Force CSI-u encoding for ctrl+digit so they survive tmux (modifyOtherKeys
# level 1 won't disambiguate these from their legacy C0 codes, e.g. C-2 == NUL == C-Space).
map ctrl+1 send_text all \x1b[49;5u
map ctrl+2 send_text all \x1b[50;5u
map ctrl+3 send_text all \x1b[51;5u
map ctrl+4 send_text all \x1b[52;5u
map ctrl+5 send_text all \x1b[53;5u
map ctrl+6 send_text all \x1b[54;5u
map ctrl+7 send_text all \x1b[55;5u
map ctrl+8 send_text all \x1b[56;5u

# map ctrl+v paste_from_clipboard
# map ctrl+shift+v send_text all \x16
# map ctrl+c copy_to_clipboard
# map ctrl+shift+c send_text all \x03

map super+shift+u     set_background_opacity 1
map super+shift+i     set_background_opacity 0.9

font_family JetBrainsMono Nerd Font Mono
font_size 15

shell_integration no-cursor
enable_audio_bell no

dynamic_background_opacity yes
hide_window_decorations yes
confirm_os_window_close 0
macos_option_as_alt both

enable_ligatures yes

allow_remote_control yes

window_margin_width 0 5
# placement_strategy top-left

background_blur 10
background_opacity 0.9

shell_integration no-cursor
cursor_shape block
cursor_blink true

# cursor_trail 10
# cursor_trail_start_threshold 0
# cursor_trail_decay 0.01 0.15
